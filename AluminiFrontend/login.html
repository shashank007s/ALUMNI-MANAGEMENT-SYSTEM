<!DOCTYPE html>
<html>
<head>
    <title>Alumni Portal Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="main-container">

    <!-- LEFT SIDE -->
    <div class="left">

        <div class="logo">
            🎓 <span>Alumni Portal</span>
        </div>

        <div class="card">

            <h2>Welcome back</h2>
            <p>Enter your credentials to access your account</p>

            <input type="email" id="email" placeholder="name@example.com">
            <input type="password" id="password" placeholder="Password">

            <button onclick="login()">Sign in</button>

            <p class="register">
                Don't have an account?
                <a href="register.html">Register now →</a>
            </p>

        </div>

    </div>

    <!-- RIGHT SIDE -->
    <div class="right">

        <div class="quote">
            <h2>
                "Staying connected with my alma mater has opened doors I never knew existed.
                The alumni network is an incredible resource."
            </h2>

            <p class="author">Alex Rivera</p>
            <p class="role">Class of 2018, Senior Engineer at TechCorp</p>
        </div>

    </div>

</div>

<script src="api.js"></script>

</body>
</html>
